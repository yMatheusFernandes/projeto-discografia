{% extends "base.html" %}

{% block conteudo %}
<form class="formulario" method="post"
      action="{% if album %}/albuns/{{ album.id }}/editar{% else %}/albuns{% endif %}">
  <label>Título do Álbum
    <input type="text" name="titulo" value="{{ album.titulo if album else '' }}" required>
  </label>
  <label>Artista (Banda/Cantor)
    <input type="text" name="artista_nome" value="{{ album.artista.nome if album else '' }}" required>
  </label>
  <label>Ano de Lançamento
    <input type="number" name="ano" value="{{ album.ano if album else '' }}" required>
  </label>
  <label>Gênero Musical
    <input type="text" name="genero" value="{{ album.genero if album else '' }}" required>
  </label>
  <label>Nota (0 a 10)
    <input type="number" step="0.1" name="nota" value="{{ album.nota if album else 0 }}">
  </label>
  <label class="checkbox">
    <input type="checkbox" name="favorito" {% if album and album.favorito %}checked{% endif %}>
    Marcar como Favorito
  </label>
  <button class="btn" type="submit">Salvar Álbum</button>
</form>
{% endblock %}
