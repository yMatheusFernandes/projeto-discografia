<!-- templates/form.html -->
{% extends "base.html" %}

{% block conteudo %}
<form class="formulario" method="post"
      action="{% if filme %}/filmes/{{ filme.id }}/editar{% else %}/filmes{% endif %}">
  <label>Título
    <input type="text" name="titulo" value="{{ filme.titulo if filme else '' }}" required>
  </label>
  <label>Diretor
    <input type="text" name="diretor" value="{{ filme.diretor if filme else '' }}" required>
  </label>
  <label>Ano
    <input type="number" name="ano" value="{{ filme.ano if filme else '' }}" required>
  </label>
  <label>Gênero
    <input type="text" name="genero" value="{{ filme.genero if filme else '' }}" required>
  </label>
  <label>Nota
    <input type="number" step="0.1" name="nota" value="{{ filme.nota if filme else 0 }}">
  </label>
  <label class="checkbox">
    <input type="checkbox" name="assistido" {% if filme and filme.assistido %}checked{% endif %}>
    Assistido
  </label>
  <button class="btn" type="submit">Salvar</button>
</form>
{% endblock %}
